<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#1a1a1a"/>
  <!-- magnifying glass circle -->
  <circle cx="16" cy="16" r="9" fill="none" stroke="#76b900" stroke-width="4"/>
  <!-- handle -->
  <line x1="8" y1="24" x2="4" y2="28" stroke="#76b900" stroke-width="4" stroke-linecap="round"/>
  <!-- <line x1="16" y1="16" x2="28" y2="16" stroke="#1a1a1a" stroke-width="6" stroke-linecap="round"/> -->
  <polygon points="16,16 30,10 30,22" fill="#1a1a1a" />
  <!-- C letter -->
  <!-- <text x="16" y="16" font-family="Inter,Helvetica,Arial,sans-serif" font-weight="700" font-size="14" fill="#76b900" text-anchor="middle" dominant-baseline="central">C</text> -->
</svg>

